---
- name: Configure and Install packages for Debian/Ubuntu
  become: true
  when: ansible_os_family == "Debian"
  block:
    - name: Ensure XKBOPTIONS is set in /etc/default/keyboard
      lineinfile:
        path: /etc/default/keyboard
        regexp: ^XKBOPTIONS=
        line: XKBOPTIONS="ctrl:nocaps"
        state: present
        backup: yes
    - name: Update apt cache (once)
      apt:
        update_cache: yes
        cache_valid_time: 3600
    - name: Install required packages on Debian/Ubuntu
      apt:
        name:
          - build-essential
          - zsh
          - curl
          - htop
          - tmux
          - ibus-mozc
          - xsel
          - stow
        state: present
    - name: Clone fzf on Debian/Ubuntu
      ansible.builtin.git:
        repo: https://github.com/junegunn/fzf.git
        dest: "{{ ansible_env.HOME }}/.fzf"
        version: "v0.67.0"
        depth: 1
    - name: Install fzf on Debian/Ubuntu
      ansible.builtin.command:
        cmd: >
          {{ ansible_env.HOME }}/.fzf/install
          --key-bindings
          --completion
          --no-update-rc
        creates: "{{ ansible_env.HOME }}/.fzf/bin/fzf"
- name: Configure and Install packages for macOS
  when: ansible_os_family == "Darwin"
  block:
    - name: Install required packages on macOS
      community.general.homebrew:
        name:
          - atuin
          - cmake
          - curl
          - fd
          - fzf
          - htop
          - node@24
          - ripgrep
          - stow
          - tmux
          - tree
          - zoxide
          - zsh
        state: present
    - name: Link Node.js to make it the default version
      ansible.builtin.command: brew link --force --overwrite node@24
- name: Ensure ~/.config exists
  file:
    path: '{{ ansible_env.HOME }}/.config'
    state: directory
    mode: "0755"
- name: Configure host-specific Pure colors
  copy:
    dest: "{{ ansible_env.HOME }}/.zsh_host_theme"
    content: |
      zstyle :prompt:pure:path color {{ pure_path_color }}
      zstyle :prompt:pure:prompt:success color {{ pure_success_color }}
  vars:
    is_thinkpad: "{{ ansible_hostname | lower is search('thinkpad$') }}"
    pure_path_color: "{{ 'green' if is_thinkpad else 'yellow' }}"
    pure_success_color: "{{ 'cyan' if is_thinkpad else 'magenta' }}"
